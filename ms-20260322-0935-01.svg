<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    .background { fill: #f0f8ff; } /* AliceBlue */
    .primary { fill: #556b2f; } /* DarkOliveGreen */
    .secondary { fill: #ff7f50; } /* Coral */
    .accent { fill: #ffd700; } /* Gold */
    .text { fill: #333333; } /* Dark Gray */
    .icon-fill { fill: #ffffff; } /* White */
  </style>

  <rect class="background" width="800" height="600"/>

  <!-- Main AI Brain Icon -->
  <g transform="translate(200, 200)">
    <path d="M100 50 C 50 0, 0 50, 50 100 C 0 150, 50 200, 100 150 C 150 200, 200 150, 150 100 C 200 50, 150 0, 100 50 Z" class="primary"/>
    <circle cx="100" cy="100" r="20" class="accent"/>
    <circle cx="70" cy="70" r="5" class="accent"/>
    <circle cx="130" cy="70" r="5" class="accent"/>
    <circle cx="70" cy="130" r="5" class="accent"/>
    <circle cx="130" cy="130" r="5" class="accent"/>
  </g>

  <!-- Connecting Lines/Neural Network Visual -->
  <line x1="150" y1="200" x2="250" y2="250" stroke="#cccccc" stroke-width="3"/>
  <line x1="150" y1="250" x2="250" y2="200" stroke="#cccccc" stroke-width="3"/>
  <line x1="200" y1="150" x2="300" y2="150" stroke="#cccccc" stroke-width="3"/>
  <line x1="200" y1="250" x2="300" y2="250" stroke="#cccccc" stroke-width="3"/>

  <!-- Children's Storybook Elements -->
  <g transform="translate(400, 200)">
    <!-- Book Icon -->
    <rect x="0" y="0" width="100" height="130" rx="10" ry="10" class="secondary"/>
    <rect x="10" y="10" width="80" height="110" rx="5" ry="5" class="icon-fill"/>
    <line x1="45" y1="20" x2="55" y2="20" stroke="#cccccc" stroke-width="2"/>
    <line x1="45" y1="40" x2="55" y2="40" stroke="#cccccc" stroke-width="2"/>
    <line x1="45" y1="60" x2="55" y2="60" stroke="#cccccc" stroke-width="2"/>
  </g>

  <g transform="translate(550, 250)">
    <!-- Star Icon -->
    <polygon points="25,0 30,20 50,20 35,35 40,55 25,40 10,55 15,35 0,20 20,20" class="accent"/>
  </g>

  <g transform="translate(500, 350)">
    <!-- Magic Wand Icon -->
    <rect x="15" y="0" width="10" height="50" class="secondary"/>
    <polygon points="10,50 20,50 25,70 15,70" class="secondary"/>
    <circle cx="20" cy="5" r="15" class="accent"/>
    <circle cx="20" cy="5" r="7" class="icon-fill"/>
  </g>

  <!-- Text Overlay -->
  <text x="50%" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" class="text">AI-Powered</text>
  <text x="50%" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" class="primary">Storybook Illustrator</text>

</svg>